server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc: # Full path required for the MVC starter
          routes:
            - id: user-service-route
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**
          # DO NOT add the filters: - name: LoadBalancer section here
          # It is causing the "Unable to find operation" crash

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


